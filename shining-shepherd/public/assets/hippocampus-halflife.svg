<svg width="960" height="440" viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Card -->
  <rect x="1" y="1" width="958" height="438" rx="20" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Title -->
  <text x="36" y="50" font-size="22" font-weight="700" fill="#1F2937">Different memories age at different speeds</text>
  <text x="36" y="74" font-size="14" fill="#6B7280">Each memory type has a half-life: the time after which its freshness counts for half.</text>

  <!-- Bars. Label column ends ~270, bars start x=290. Max bar width 600 (to x=890). -->
  <!-- widths chosen on a gentle log scale so 7 days stays visible while order reads true -->

  <!-- rules ~10 years -->
  <g>
    <text x="252" y="124" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Rules &amp; decisions</text>
    <rect x="290" y="108" width="600" height="26" rx="6" fill="#4F46E5"/>
    <text x="878" y="126" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="end">~10 years</text>
  </g>
  <!-- tools/people ~2 years -->
  <g>
    <text x="252" y="170" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Tools &amp; people</text>
    <rect x="290" y="154" width="468" height="26" rx="6" fill="#4F46E5" opacity="0.82"/>
    <text x="770" y="172" font-size="13" fill="#6B7280">~2 years</text>
  </g>
  <!-- facts ~1 year -->
  <g>
    <text x="252" y="216" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Facts &amp; projects</text>
    <rect x="290" y="200" width="396" height="26" rx="6" fill="#4F46E5" opacity="0.68"/>
    <text x="698" y="218" font-size="13" fill="#6B7280">~1 year</text>
  </g>
  <!-- reflections ~6 months -->
  <g>
    <text x="252" y="262" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Reflections &amp; notes</text>
    <rect x="290" y="246" width="324" height="26" rx="6" fill="#4F46E5" opacity="0.54"/>
    <text x="626" y="264" font-size="13" fill="#6B7280">~6 months</text>
  </g>
  <!-- tasks ~90 days -->
  <g>
    <text x="252" y="308" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Tasks &amp; todos</text>
    <rect x="290" y="292" width="228" height="26" rx="6" fill="#4F46E5" opacity="0.40"/>
    <text x="530" y="310" font-size="13" fill="#6B7280">~90 days</text>
  </g>
  <!-- pings ~7 days -->
  <g>
    <text x="252" y="354" font-size="15" font-weight="600" fill="#1F2937" text-anchor="end">Operational pings</text>
    <rect x="290" y="338" width="96" height="26" rx="6" fill="#4F46E5" opacity="0.28"/>
    <text x="398" y="356" font-size="13" fill="#6B7280">~7 days</text>
  </g>

  <text x="36" y="408" font-size="13" fill="#6B7280">A permanent rule stays findable for years; a health check fades within a week. So old rules never flood out fresh facts.</text>
</svg>
