<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Full-bleed light surface (object-cover safe) -->
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1200" height="630" fill="#FFFFFF" opacity="0"/>

  <!-- subtle hairline frame inset so it reads as a card even cropped -->
  <rect x="28" y="28" width="1144" height="574" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Left: title block -->
  <text x="88" y="262" font-size="76" font-weight="800" fill="#1F2937">Hippocampus</text>
  <text x="88" y="312" font-size="30" fill="#6B7280">long-term memory for AI agents</text>

  <!-- accent rule under title -->
  <rect x="90" y="346" width="118" height="6" rx="3" fill="#4F46E5"/>

  <text x="88" y="408" font-size="20" fill="#6B7280">Hybrid retrieval · type-aware decay · one SQLite file</text>

  <!-- Right: architecture motif -->
  <!-- layer bars -->
  <g>
    <rect x="760" y="150" width="300" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="760" y="150" width="10" height="48" rx="5" fill="#4F46E5"/>
    <text x="790" y="180" font-size="18" font-weight="600" fill="#1F2937">Always-on rules</text>

    <rect x="760" y="210" width="300" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="760" y="210" width="10" height="48" rx="5" fill="#4F46E5"/>
    <text x="790" y="240" font-size="18" font-weight="600" fill="#1F2937">On-demand rules</text>

    <rect x="760" y="270" width="300" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="760" y="270" width="10" height="48" rx="5" fill="#4F46E5"/>
    <text x="790" y="300" font-size="18" font-weight="600" fill="#1F2937">Explicit recall</text>

    <rect x="760" y="330" width="300" height="48" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2"/>
    <rect x="760" y="330" width="10" height="48" rx="5" fill="#4F46E5"/>
    <text x="790" y="360" font-size="18" font-weight="600" fill="#1F2937">Weighted retrieval</text>
  </g>

  <!-- SQLite-file glyph below the bars -->
  <g transform="translate(820 410)">
    <path d="M0 16 Q0 0 16 0 L150 0 Q166 0 166 16 L166 116 Q166 132 150 132 L16 132 Q0 132 0 116 Z"
          fill="#FFFFFF" stroke="#4F46E5" stroke-width="2.5"/>
    <!-- folded corner -->
    <path d="M132 0 L166 34 L132 34 Z" fill="#F8FAFC" stroke="#4F46E5" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- two stores inside -->
    <rect x="22" y="56" width="122" height="26" rx="6" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="22" y="92" width="122" height="26" rx="6" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="36" cy="69" r="4" fill="#4F46E5"/>
    <circle cx="36" cy="105" r="4" fill="#4F46E5"/>
    <text x="48" y="73" font-size="12" fill="#6B7280">curated store</text>
    <text x="48" y="109" font-size="12" fill="#6B7280">raw archive</text>
  </g>
  <text x="903" y="576" font-size="15" fill="#6B7280" text-anchor="middle">two stores, one file</text>
</svg>
